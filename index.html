<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Lines — Creative Coding</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --fg: #ffffff;
    --panel: #111111;
    --border: #222222;
    --muted: #555555;
    --label: #888888;
    --font: 'Space Mono', monospace;
  }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font);
    font-size: 13px;
    height: 100%;
    overflow: hidden;
  }

  #layout {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    min-height: 0;
  }

  canvas#main {
    display: block;
    max-width: 100%;
    max-height: 100%;
    transform-origin: center center;
  }

  #panel {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }

  .panel-row {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .ctrl-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 100px;
  }

  .ctrl-label {
    color: var(--label);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    outline: none;
    flex: 1;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--fg);
    cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--fg);
    cursor: pointer;
    border: none;
  }

  .val {
    font-size: 11px;
    color: var(--fg);
    min-width: 32px;
    text-align: right;
    letter-spacing: 0.04em;
  }

  select {
    background: #1a1a1a;
    color: var(--fg);
    border: 1px solid var(--border);
    font-family: var(--font);
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
    outline: none;
    width: 100%;
  }

  input[type=number] {
    background: #1a1a1a;
    color: var(--fg);
    border: 1px solid var(--border);
    font-family: var(--font);
    font-size: 11px;
    padding: 3px 5px;
    width: 58px;
    outline: none;
    -moz-appearance: textfield;
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { opacity: 0.3; }
  input[type=number]:disabled { opacity: 0.35; }

  input[type=color] {
    -webkit-appearance: none;
    width: 26px;
    height: 22px;
    padding: 1px;
    border: 1px solid var(--border);
    background: #1a1a1a;
    cursor: pointer;
    border-radius: 2px;
  }
  input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type=color]::-webkit-color-swatch { border: none; }

  input.hex-input {
    background: #1a1a1a;
    color: var(--fg);
    border: 1px solid var(--border);
    font-family: var(--font);
    font-size: 11px;
    padding: 3px 6px;
    width: 72px;
    outline: none;
    letter-spacing: 0.05em;
  }
  input.hex-input:focus { border-color: #444; }

  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-left: auto;
  }

  .btn-row { display: flex; gap: 6px; }

  button {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--border);
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    white-space: nowrap;
  }
  button:hover { background: #1a1a1a; border-color: #444; }
  button.active { border-color: var(--fg); }
  button.sm { padding: 4px 8px; font-size: 11px; }
  button.export { font-size: 10px; padding: 4px 9px; color: var(--label); border-color: #1e1e1e; }
  button.export:hover { color: var(--fg); border-color: #444; }

  .color-preset {
    width: 18px; height: 18px;
    border: 1px solid var(--border);
    cursor: pointer;
    border-radius: 2px;
    padding: 0;
    flex-shrink: 0;
  }
  .color-preset:hover { border-color: #666; }

  #audio-meter {
    width: 44px; height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
  }
  #audio-bar {
    height: 100%;
    width: 0%;
    background: #00cc44;
    transition: width 0.05s;
  }

  #status {
    position: absolute;
    bottom: 8px;
    left: 12px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    pointer-events: none;
  }

  #zoom-hud {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="layout">
  <div id="canvas-wrap">
    <canvas id="main"></canvas>
    <div id="status">WAVE LINES — creative coding</div>
    <div id="zoom-hud">100%</div>
  </div>

  <div id="panel">

    <!-- ROW 1: wave controls -->
    <div class="panel-row">

      <div class="ctrl-group">
        <div class="ctrl-label">Estilo</div>
        <select id="s-style">
          <option value="lines">Líneas simples</option>
          <option value="taper">Espiga (punta)</option>
          <option value="piano">Piano (teclas)</option>
          <option value="spikes">Spikes (flecha)</option>
          <option value="segments">Segmentos</option>
          <option value="mixed">Mixto</option>
        </select>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-label">Cantidad</div>
        <div class="ctrl-row">
          <input type="range" id="s-count" min="5" max="120" value="45" step="1">
          <span class="val" id="v-count">45</span>
        </div>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-label">Longitud</div>
        <div class="ctrl-row">
          <input type="range" id="s-length" min="0.1" max="1.0" value="0.75" step="0.01">
          <span class="val" id="v-length">75%</span>
        </div>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-label">Λ Long. de onda</div>
        <div class="ctrl-row">
          <input type="range" id="s-lambda" min="0.3" max="8" value="2" step="0.1">
          <span class="val" id="v-lambda">2.0</span>
        </div>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-label">Velocidad</div>
        <div class="ctrl-row">
          <input type="range" id="s-speed" min="0.1" max="4" value="0.8" step="0.05">
          <span class="val" id="v-speed">0.80</span>
        </div>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-label">Amortiguación</div>
        <div class="ctrl-row">
          <input type="range" id="s-damp" min="0" max="1" value="0" step="0.01">
          <span class="val" id="v-damp">0%</span>
        </div>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-label">Grosor base</div>
        <div class="ctrl-row">
          <input type="range" id="s-thick" min="1" max="24" value="6" step="0.5">
          <span class="val" id="v-thick">6.0</span>
        </div>
      </div>

      <div class="btn-group">
        <div class="btn-row">
          <button id="btn-play" class="active" onclick="togglePlay()">⏸ PAUSAR</button>
          <button onclick="randomize()">⟳ ALEATORIO</button>
        </div>
        <div class="btn-row">
          <button class="export" onclick="exportPNG()">↓ PNG</button>
          <button class="export" onclick="exportViewportPNG()">↓ VISTA</button>
          <button class="export" onclick="exportSVG()">↓ SVG</button>
          <button class="export" onclick="resetDefaults()">RESET</button>
        </div>
      </div>

    </div>

    <!-- ROW 2: canvas / zoom / color / audio -->
    <div class="panel-row">

      <div class="ctrl-group" style="min-width:210px;">
        <div class="ctrl-label">Tamaño lienzo</div>
        <div class="ctrl-row">
          <input type="number" id="s-width"  value="1200" min="100" max="8000" step="10">
          <span style="color:var(--muted);font-size:10px;">×</span>
          <input type="number" id="s-height" value="600"  min="100" max="8000" step="10">
          <button id="btn-resp" class="sm" onclick="toggleResponsive()" title="Alternar modo fijo / responsivo">FIJO</button>
        </div>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-label">Zoom</div>
        <div class="ctrl-row">
          <button class="sm" onclick="zoomStep(-0.25)">−</button>
          <span class="val" id="v-zoom" style="min-width:38px;text-align:center;">100%</span>
          <button class="sm" onclick="zoomStep(+0.25)">+</button>
          <button class="sm" onclick="resetZoom()" title="Restablecer zoom y posición">⌂</button>
        </div>
      </div>

      <div class="ctrl-group" style="min-width:220px;">
        <div class="ctrl-label">Color fondo</div>
        <div class="ctrl-row">
          <input type="color"  id="s-bg-color" value="#000000">
          <input type="text"   id="s-bg-hex"   class="hex-input" value="#000000" maxlength="7" placeholder="#000000" spellcheck="false">
          <button class="color-preset" style="background:#000000" onclick="setPreset('#000000')" title="Negro"></button>
          <button class="color-preset" style="background:#ffffff" onclick="setPreset('#ffffff')" title="Blanco"></button>
          <button class="color-preset" style="background:#F0A500" onclick="setPreset('#F0A500')" title="Ámbar"></button>
          <button class="color-preset" style="background:#E84B00" onclick="setPreset('#E84B00')" title="Naranja"></button>
        </div>
      </div>

      <div class="ctrl-group">
        <div class="ctrl-label">Audio reactivo</div>
        <div class="ctrl-row">
          <button id="btn-audio" class="sm" onclick="toggleAudio()">MIC OFF</button>
          <div id="audio-meter"><div id="audio-bar"></div></div>
        </div>
      </div>

    </div>

  </div>
</div>

<script>
// ── STATE ────────────────────────────────────────────────────
const canvas = document.getElementById('main');
const ctx    = canvas.getContext('2d');
let W = 1200, H = 600;
let playing = true;
let t = 0;

// zoom / pan
let zoom = 1.0, panX = 0, panY = 0;
let isPanning = false, panStartX = 0, panStartY = 0;

// responsive mode
let responsive = false;

// color
let customBg = '#000000', customFg = '#ffffff';

// audio
let audioActive = false;
let audioCtxObj = null, audioAnalyser = null, audioData = null, audioStream = null;
let audioLevel  = 1.0;

// ── CANVAS SIZE ──────────────────────────────────────────────
function applyCanvasSize() {
  if (responsive) {
    const wrap = document.getElementById('canvas-wrap');
    W = Math.max(1, Math.round(wrap.clientWidth));
    H = Math.max(1, Math.round(wrap.clientHeight));
    canvas.style.width    = '100%';
    canvas.style.height   = '100%';
    canvas.style.maxWidth  = '';
    canvas.style.maxHeight = '';
    document.getElementById('s-width').value  = W;
    document.getElementById('s-height').value = H;
  } else {
    W = parseInt(document.getElementById('s-width').value)  || 1200;
    H = parseInt(document.getElementById('s-height').value) || 600;
    canvas.style.width     = '';
    canvas.style.height    = '';
    canvas.style.maxWidth  = '100%';
    canvas.style.maxHeight = '100%';
  }
  canvas.width  = W;
  canvas.height = H;
}

function toggleResponsive() {
  responsive = !responsive;
  const btn = document.getElementById('btn-resp');
  btn.textContent = responsive ? 'RESP' : 'FIJO';
  btn.classList.toggle('active', responsive);
  document.getElementById('s-width').disabled  = responsive;
  document.getElementById('s-height').disabled = responsive;
  applyCanvasSize();
}

document.getElementById('s-width').addEventListener('change',  () => { if (!responsive) applyCanvasSize(); });
document.getElementById('s-height').addEventListener('change', () => { if (!responsive) applyCanvasSize(); });

new ResizeObserver(() => { if (responsive) applyCanvasSize(); })
  .observe(document.getElementById('canvas-wrap'));

window.addEventListener('resize', () => { if (!responsive) applyCanvasSize(); });

// ── ZOOM & PAN ───────────────────────────────────────────────
function applyZoom() {
  canvas.style.transformOrigin = 'center center';
  canvas.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  const pct = Math.round(zoom * 100) + '%';
  document.getElementById('v-zoom').textContent   = pct;
  document.getElementById('zoom-hud').textContent = pct;
  const wrap = document.getElementById('canvas-wrap');
  wrap.style.cursor = isPanning ? 'grabbing' : (zoom > 1.02 ? 'grab' : 'default');
}

function zoomStep(delta) {
  zoom = Math.max(0.25, Math.min(8, +(zoom + delta).toFixed(2)));
  if (zoom <= 1) { panX = 0; panY = 0; }
  applyZoom();
}

function resetZoom() { zoom = 1; panX = 0; panY = 0; applyZoom(); }

// wheel zoom
document.getElementById('canvas-wrap').addEventListener('wheel', (e) => {
  e.preventDefault();
  zoomStep(e.deltaY < 0 ? 0.12 : -0.12);
}, { passive: false });

// mouse drag pan
const wrapEl = document.getElementById('canvas-wrap');
wrapEl.addEventListener('mousedown', (e) => {
  if (zoom <= 1.02) return;
  e.preventDefault();
  isPanning = true;
  panStartX = e.clientX - panX;
  panStartY = e.clientY - panY;
  applyZoom();
});
window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  panX = e.clientX - panStartX;
  panY = e.clientY - panStartY;
  applyZoom();
});
window.addEventListener('mouseup', () => {
  if (!isPanning) return;
  isPanning = false;
  applyZoom();
});

// touch pinch-zoom + pan
let lastPinchDist = null;
wrapEl.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    lastPinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  } else if (e.touches.length === 1 && zoom > 1.02) {
    isPanning  = true;
    panStartX  = e.touches[0].clientX - panX;
    panStartY  = e.touches[0].clientY - panY;
  }
}, { passive: true });

wrapEl.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if (lastPinchDist) {
      zoom = Math.max(0.25, Math.min(8, zoom * (d / lastPinchDist)));
      if (zoom <= 1) { panX = 0; panY = 0; }
      applyZoom();
    }
    lastPinchDist = d;
  } else if (e.touches.length === 1 && isPanning) {
    panX = e.touches[0].clientX - panStartX;
    panY = e.touches[0].clientY - panStartY;
    applyZoom();
  }
}, { passive: false });

wrapEl.addEventListener('touchend', () => {
  lastPinchDist = null;
  isPanning = false;
  applyZoom();
}, { passive: true });

// ── COLOR SYSTEM ─────────────────────────────────────────────
function bgLuminance(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return (0.299*r + 0.587*g + 0.114*b) / 255;
}

function syncBgColor(hex) {
  customBg = hex;
  customFg = bgLuminance(hex) > 0.45 ? '#000000' : '#ffffff';
  document.getElementById('s-bg-color').value = hex;
  document.getElementById('s-bg-hex').value   = hex.toUpperCase();
}

function setPreset(hex) { syncBgColor(hex); }

document.getElementById('s-bg-color').addEventListener('input', function() {
  syncBgColor(this.value);
});

document.getElementById('s-bg-hex').addEventListener('input', function() {
  const raw = this.value.trim();
  const full = raw.startsWith('#') ? raw : '#' + raw;
  if (/^#[0-9a-fA-F]{6}$/.test(full)) {
    customBg = full;
    customFg = bgLuminance(full) > 0.45 ? '#000000' : '#ffffff';
    document.getElementById('s-bg-color').value = full;
  }
});

document.getElementById('s-bg-hex').addEventListener('blur', function() {
  syncBgColor(document.getElementById('s-bg-color').value);
});

// ── PARAMS ───────────────────────────────────────────────────
function p(id) {
  const el = document.getElementById(id);
  return el.type === 'range' ? parseFloat(el.value) : el.value;
}

// ── AUDIO REACTIVITY ─────────────────────────────────────────
async function toggleAudio() {
  const btn = document.getElementById('btn-audio');
  if (audioActive) {
    if (audioStream) audioStream.getTracks().forEach(tr => tr.stop());
    if (audioCtxObj) audioCtxObj.close();
    audioCtxObj = audioAnalyser = audioData = audioStream = null;
    audioActive = false;
    audioLevel  = 1.0;
    btn.textContent = 'MIC OFF';
    btn.classList.remove('active');
    document.getElementById('audio-bar').style.width = '0%';
    return;
  }
  try {
    audioStream  = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtxObj  = new (window.AudioContext || window.webkitAudioContext)();
    const src    = audioCtxObj.createMediaStreamSource(audioStream);
    audioAnalyser = audioCtxObj.createAnalyser();
    audioAnalyser.fftSize = 256;
    audioAnalyser.smoothingTimeConstant = 0.75;
    src.connect(audioAnalyser);
    audioData   = new Uint8Array(audioAnalyser.frequencyBinCount);
    audioActive = true;
    btn.textContent = 'MIC ON';
    btn.classList.add('active');
  } catch (err) {
    alert('No se pudo acceder al micrófono: ' + err.message);
  }
}

function updateAudio() {
  if (!audioActive || !audioAnalyser) { audioLevel = 1.0; return; }
  audioAnalyser.getByteFrequencyData(audioData);
  let sum = 0;
  const half = Math.floor(audioData.length * 0.6);
  for (let i = 0; i < half; i++) sum += audioData[i];
  const avg = sum / half;
  audioLevel = 0.15 + (avg / 128) * 2.2;
  document.getElementById('audio-bar').style.width = Math.min(100, avg / 128 * 100) + '%';
}

// ── WAVE PHYSICS ─────────────────────────────────────────────
function waveAt(xNorm, tNow) {
  const lambda = p('s-lambda');
  const speed  = p('s-speed');
  const damp   = p('s-damp');
  const maxLen = p('s-length');

  const phase = (2 * Math.PI * xNorm * lambda) - (speed * tNow);
  const amp   = maxLen * Math.sin(phase);

  let envelope = 1;
  if (damp > 0) {
    const sigma = 0.35 * (1 - damp * 0.9);
    const d = xNorm - 0.5;
    envelope = Math.exp(-(d * d) / (2 * sigma * sigma));
  }
  return amp * envelope * audioLevel;
}

// ── HELPERS ──────────────────────────────────────────────────
function roundRect(c, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y,     x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x,     y + h, x,     y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x,     y,     x + r, y);
  c.closePath();
}

// ── SHAPE RENDERERS ──────────────────────────────────────────
function drawLine(len, thick) {
  ctx.lineWidth = Math.max(0.5, thick * 0.22);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, -len);
  ctx.lineTo(0,  len);
  ctx.stroke();
}

function drawTaper(len, sign, thick) {
  const hw    = thick * 0.52;
  const yPeak = -sign * len;
  const yBase =  sign * len;
  ctx.beginPath();
  ctx.moveTo(0, yPeak);
  ctx.bezierCurveTo( hw*0.08, yPeak*0.55,  hw, yPeak*0.08,  hw, 0);
  ctx.bezierCurveTo( hw,      yBase*0.08,  hw*0.08, yBase*0.55,  0, yBase);
  ctx.bezierCurveTo(-hw*0.08, yBase*0.55, -hw, yBase*0.08, -hw, 0);
  ctx.bezierCurveTo(-hw,      yPeak*0.08, -hw*0.08, yPeak*0.55,  0, yPeak);
  ctx.closePath();
  ctx.fill();
}

function drawPiano(len, sign, thick, fg, bg) {
  const wKeyW = Math.max(5, thick * 0.88);
  const bKeyW = wKeyW * 0.52;
  const bKeyH = len * 2 * 0.58;
  roundRect(ctx, -wKeyW/2, -len, wKeyW, len*2, 2);
  ctx.fillStyle = fg; ctx.fill();
  const bTop = -sign * len;
  const bH   =  sign * bKeyH;
  roundRect(ctx, -bKeyW/2, Math.min(bTop, bTop+bH), bKeyW, Math.abs(bH), 1);
  ctx.fillStyle = bg; ctx.fill();
}

function drawSpike(len, sign, thick) {
  const lw    = Math.max(0.5, thick * 0.22);
  const tip   = 4 + thick * 0.7;
  const yPeak = -sign * len;
  const yBase =  sign * len;
  ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(0, yBase); ctx.lineTo(0, yPeak); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-tip, yPeak + sign*tip*2.2);
  ctx.lineTo(0, yPeak);
  ctx.lineTo( tip, yPeak + sign*tip*2.2);
  ctx.stroke();
}

function drawSegments(len, sign, thick) {
  const lw   = Math.max(0.5, thick * 0.22);
  const segs = 3;
  const segH = (len * 2) / segs;
  const gap  = Math.max(3, segH * 0.2);
  const bw   = thick * 0.85;
  ctx.lineWidth = lw; ctx.lineCap = 'round';
  for (let s = 0; s < segs; s++) {
    const top = -sign*len + sign*s*segH + sign*gap/2;
    const bot = top + sign*(segH - gap);
    ctx.beginPath(); ctx.moveTo(0, top); ctx.lineTo(0, bot); ctx.stroke();
    const b1 = top + sign*(segH-gap)*0.2;
    const b2 = top + sign*(segH-gap)*0.8;
    ctx.beginPath();
    ctx.moveTo(-bw, b1); ctx.lineTo(bw, b1);
    ctx.moveTo(-bw, b2); ctx.lineTo(bw, b2);
    ctx.stroke();
  }
}

// ── DRAW FRAME ───────────────────────────────────────────────
const ALL_STYLES = ['lines','taper','piano','spikes','segments'];

function drawFrame() {
  const count = Math.round(p('s-count'));
  const thick = p('s-thick');
  const style = p('s-style');

  ctx.fillStyle = customBg;
  ctx.fillRect(0, 0, W, H);

  const marginX = W * 0.04;
  const usableW = W - marginX * 2;
  const cy      = H / 2;
  const maxH    = H * 0.46;

  for (let i = 0; i < count; i++) {
    const xNorm   = i / Math.max(count-1, 1);
    const x       = marginX + xNorm * usableW;
    const wv      = waveAt(xNorm, t);
    const halfLen = wv * maxH;
    const absLen  = Math.abs(halfLen);
    if (absLen < 1.5) continue;

    const sign = halfLen >= 0 ? 1 : -1;
    const ls   = style === 'mixed' ? ALL_STYLES[i % ALL_STYLES.length] : style;

    ctx.save();
    ctx.translate(x, cy);
    ctx.strokeStyle = customFg;
    ctx.fillStyle   = customFg;
    ctx.lineJoin    = 'round';

    if      (ls === 'lines')    drawLine(absLen, thick);
    else if (ls === 'taper')    drawTaper(absLen, sign, thick);
    else if (ls === 'piano')    drawPiano(absLen, sign, thick, customFg, customBg);
    else if (ls === 'spikes')   drawSpike(absLen, sign, thick);
    else if (ls === 'segments') drawSegments(absLen, sign, thick);

    ctx.restore();
  }
}

// ── LOOP ─────────────────────────────────────────────────────
function loop() {
  if (playing) t += 0.016;
  updateAudio();
  drawFrame();
  requestAnimationFrame(loop);
}

// ── CONTROLS ─────────────────────────────────────────────────
function togglePlay() {
  playing = !playing;
  const btn = document.getElementById('btn-play');
  btn.textContent = playing ? '⏸ PAUSAR' : '▶ ANIMAR';
  btn.classList.toggle('active', playing);
}

function randomize() {
  setVal('s-count',  ri(12, 80));
  setVal('s-length', rf(0.35, 0.95));
  setVal('s-lambda', rf(0.5, 6));
  setVal('s-speed',  rf(0.2, 2.5));
  setVal('s-damp',   rf(0, 0.8));
  setVal('s-thick',  rf(2, 18));
  document.getElementById('s-style').value = ['lines','taper','piano','spikes','segments','mixed'][ri(0,5)];
  syncBgColor(['#000000','#ffffff','#F0A500','#E84B00'][ri(0,3)]);
  updateLabels();
}

function resetDefaults() {
  setVal('s-count', 45); setVal('s-length', 0.75); setVal('s-lambda', 2);
  setVal('s-speed', 0.8); setVal('s-damp', 0); setVal('s-thick', 6);
  document.getElementById('s-style').value = 'lines';
  syncBgColor('#000000');
  updateLabels();
}

function ri(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function rf(a, b) { return +(a + Math.random() * (b - a)).toFixed(3); }
function setVal(id, v) { document.getElementById(id).value = v; }

// ── LABELS ───────────────────────────────────────────────────
const labelMap = {
  'v-count':  () => Math.round(p('s-count')),
  'v-length': () => Math.round(p('s-length') * 100) + '%',
  'v-lambda': () => p('s-lambda').toFixed(1),
  'v-speed':  () => p('s-speed').toFixed(2),
  'v-damp':   () => Math.round(p('s-damp') * 100) + '%',
  'v-thick':  () => p('s-thick').toFixed(1),
};

function updateLabels() {
  for (const [id, fn] of Object.entries(labelMap)) {
    const el = document.getElementById(id);
    if (el) el.textContent = fn();
  }
}

document.querySelectorAll('input[type=range]').forEach(el => {
  el.addEventListener('input', updateLabels);
});

// ── EXPORT PNG (lienzo completo) ─────────────────────────────
function exportPNG() {
  drawFrame();
  const link = document.createElement('a');
  link.download = 'wave-lines-' + Date.now() + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ── EXPORT VIEWPORT PNG (solo lo visible) ────────────────────
function exportViewportPNG() {
  drawFrame();
  const wrapRect   = document.getElementById('canvas-wrap').getBoundingClientRect();
  const canvasRect = canvas.getBoundingClientRect();

  const left   = Math.max(wrapRect.left,   canvasRect.left);
  const top    = Math.max(wrapRect.top,    canvasRect.top);
  const right  = Math.min(wrapRect.right,  canvasRect.right);
  const bottom = Math.min(wrapRect.bottom, canvasRect.bottom);
  if (right <= left || bottom <= top) return;

  const scaleX = W / canvasRect.width;
  const scaleY = H / canvasRect.height;
  const srcX = (left   - canvasRect.left) * scaleX;
  const srcY = (top    - canvasRect.top)  * scaleY;
  const srcW = (right  - left)  * scaleX;
  const srcH = (bottom - top)   * scaleY;

  const tmp = document.createElement('canvas');
  tmp.width  = Math.round(srcW);
  tmp.height = Math.round(srcH);
  tmp.getContext('2d').drawImage(canvas, srcX, srcY, srcW, srcH, 0, 0, tmp.width, tmp.height);

  const link = document.createElement('a');
  link.download = 'wave-lines-view-' + Date.now() + '.png';
  link.href = tmp.toDataURL('image/png');
  link.click();
}

// ── EXPORT SVG ───────────────────────────────────────────────
function exportSVG() {
  const count   = Math.round(p('s-count'));
  const thick   = p('s-thick');
  const style   = p('s-style');
  const marginX = W * 0.04;
  const usableW = W - marginX * 2;
  const cy      = H / 2;
  const maxH    = H * 0.46;
  const lw      = (Math.max(0.5, thick * 0.22)).toFixed(2);

  let paths = '';

  for (let i = 0; i < count; i++) {
    const xNorm   = i / Math.max(count-1, 1);
    const x       = marginX + xNorm * usableW;
    const wv      = waveAt(xNorm, t);
    const halfLen = wv * maxH;
    const absLen  = Math.abs(halfLen);
    if (absLen < 1.5) continue;

    const sign  = halfLen >= 0 ? 1 : -1;
    const ls    = style === 'mixed' ? ALL_STYLES[i % ALL_STYLES.length] : style;
    const yPeak = cy - sign * absLen;
    const yBase = cy + sign * absLen;

    if (ls === 'lines') {
      paths += `<line x1="${x.toFixed(1)}" y1="${yPeak.toFixed(1)}" x2="${x.toFixed(1)}" y2="${yBase.toFixed(1)}" stroke-width="${(thick*0.25).toFixed(2)}" stroke-linecap="round"/>`;

    } else if (ls === 'taper') {
      const hw = thick * 0.52;
      paths += `<path d="M ${x.toFixed(2)},${yPeak.toFixed(2)} C ${(x+hw*0.08).toFixed(2)},${(yPeak+(cy-yPeak)*0.55).toFixed(2)} ${(x+hw).toFixed(2)},${(yPeak+(cy-yPeak)*0.92).toFixed(2)} ${(x+hw).toFixed(2)},${cy.toFixed(2)} C ${(x+hw).toFixed(2)},${(cy+(yBase-cy)*0.08).toFixed(2)} ${(x+hw*0.08).toFixed(2)},${(cy+(yBase-cy)*0.55).toFixed(2)} ${x.toFixed(2)},${yBase.toFixed(2)} C ${(x-hw*0.08).toFixed(2)},${(cy+(yBase-cy)*0.55).toFixed(2)} ${(x-hw).toFixed(2)},${(cy+(yBase-cy)*0.08).toFixed(2)} ${(x-hw).toFixed(2)},${cy.toFixed(2)} C ${(x-hw).toFixed(2)},${(yPeak+(cy-yPeak)*0.92).toFixed(2)} ${(x-hw*0.08).toFixed(2)},${(yPeak+(cy-yPeak)*0.55).toFixed(2)} ${x.toFixed(2)},${yPeak.toFixed(2)} Z" fill="${customFg}" stroke="none"/>`;

    } else if (ls === 'piano') {
      const wKeyW = Math.max(5, thick * 0.88);
      const bKeyW = wKeyW * 0.52;
      const bKeyH = absLen * 2 * 0.58;
      const yTop  = cy - absLen;
      const bTopY = Math.min(yPeak, yPeak + sign * bKeyH);
      paths += `<rect x="${(x-wKeyW/2).toFixed(2)}" y="${yTop.toFixed(2)}" width="${wKeyW.toFixed(2)}" height="${(absLen*2).toFixed(2)}" rx="2" fill="${customFg}" stroke="none"/>`;
      paths += `<rect x="${(x-bKeyW/2).toFixed(2)}" y="${bTopY.toFixed(2)}" width="${bKeyW.toFixed(2)}" height="${Math.abs(bKeyH).toFixed(2)}" rx="1" fill="${customBg}" stroke="none"/>`;

    } else if (ls === 'spikes') {
      const tip = 4 + thick * 0.7;
      paths += `<line x1="${x.toFixed(1)}" y1="${yBase.toFixed(1)}" x2="${x.toFixed(1)}" y2="${yPeak.toFixed(1)}" stroke-width="${lw}" stroke-linecap="round"/>`;
      paths += `<polyline points="${(x-tip).toFixed(1)},${(yPeak+sign*tip*2.2).toFixed(1)} ${x.toFixed(1)},${yPeak.toFixed(1)} ${(x+tip).toFixed(1)},${(yPeak+sign*tip*2.2).toFixed(1)}" stroke-width="${lw}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;

    } else if (ls === 'segments') {
      const segs = 3;
      const segH = (absLen * 2) / segs;
      const gap  = Math.max(3, segH * 0.2);
      const bw   = thick * 0.85;
      for (let s = 0; s < segs; s++) {
        const top = yPeak + sign*s*segH + sign*gap/2;
        const bot = top + sign*(segH - gap);
        const b1  = top + sign*(segH-gap)*0.2;
        const b2  = top + sign*(segH-gap)*0.8;
        paths += `<line x1="${x.toFixed(1)}" y1="${top.toFixed(1)}" x2="${x.toFixed(1)}" y2="${bot.toFixed(1)}" stroke-width="${lw}" stroke-linecap="round"/>`;
        paths += `<line x1="${(x-bw).toFixed(1)}" y1="${b1.toFixed(1)}" x2="${(x+bw).toFixed(1)}" y2="${b1.toFixed(1)}" stroke-width="${lw}" stroke-linecap="round"/>`;
        paths += `<line x1="${(x-bw).toFixed(1)}" y1="${b2.toFixed(1)}" x2="${(x+bw).toFixed(1)}" y2="${b2.toFixed(1)}" stroke-width="${lw}" stroke-linecap="round"/>`;
      }
    }
  }

  const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
  <rect width="${W}" height="${H}" fill="${customBg}"/>
  <g stroke="${customFg}" fill="none">${paths}</g>
</svg>`;

  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const link = document.createElement('a');
  link.download = 'wave-lines-' + Date.now() + '.svg';
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
}

// ── INIT ─────────────────────────────────────────────────────
applyCanvasSize();
syncBgColor('#000000');
updateLabels();
loop();
</script>
